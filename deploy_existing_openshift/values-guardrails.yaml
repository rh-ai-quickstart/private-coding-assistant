# Values override for deploying pca-guardrails on an existing OpenShift cluster.
# Prerequisites: RHOAI 3.3+ with TrustyAI component enabled in DataScienceCluster.
#
# Deploy:   make deploy-guardrails NAMESPACE=private-assistant
# Undeploy: make undeploy-guardrails NAMESPACE=private-assistant
#
# Enforcement modes:
#   block    — detections above threshold block the request (default)
#   warn     — detections logged, request passes through
#   log-only — same as warn, semantic distinction for alerting

guardrails:
  enforcement: block
  llmService:
    host: qwen3-coder-kserve-workload-svc
    port: 8000
    tlsSecret: qwen3-coder-kserve-self-signed-certs
  replicas: 1
  # Disabled: gateway sidecar can't parse vLLM responses from qwen3_coder parser.
  # Use the orchestrator detection API on port 8032 instead.
  gateway:
    enabled: false
  detectors:
    promptInjection:
      enabled: true
      model: protectai/deberta-v3-base-prompt-injection-v2
      threshold: 0.5
      useGpu: false
    piiRegex:
      enabled: true
    # To add a custom secret pattern, append a regex to this list and redeploy.
    secretsRegex:
      enabled: true
      patterns:
        - '\bAKIA[0-9A-Z]{16}\b' # AWS Access Key ID
        - '\bgh[ps]_[A-Za-z0-9_]{36,}\b' # GitHub token
        - '\bglpat-[A-Za-z0-9\-_]{20,}\b' # GitLab token
        - '\bsk-[A-Za-z0-9]{20,}\b' # OpenAI API key
        - '\bsk-ant-[A-Za-z0-9\-_]{20,}\b' # Anthropic API key
        - '\bxox[baprs]-[A-Za-z0-9\-]{10,}\b' # Slack token
        - '-----BEGIN\s+(RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----' # Private key
  otel:
    enabled: false
