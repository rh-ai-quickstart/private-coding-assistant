# Values override for deploying pca-platform-config on an existing OpenShift cluster.
# Disables cluster-scoped resources (DSC, DSCI, ClusterPolicy, etc.) that are already present.
# Disables devspace namespace/RBAC creation (handled by --create-namespace in devspace target).

clusterConfig:
  enabled: false
devspaces:
  enabled: false
  instances:
    - namespace: dev-user1-devspaces
      name: code-workspace-1
      user: dev-user1
      password: "Dev1@PCA2026!"
    - namespace: dev-user2-devspaces
      name: code-workspace-2
      user: dev-user2
      password: "Dev2@PCA2026!"
    - namespace: dev-user3-devspaces
      name: code-workspace-3
      user: dev-user3
      password: "Dev3@PCA2026!"
# Guardrails sub-chart config. Set guardrails.enabled: true in the parent to enable.
# To add secret patterns, append regex to pca-guardrails.guardrails.detectors.secretsRegex.patterns.
pca-guardrails:
  namespace: hacohen-ai-coder
  guardrails:
    enforcement: block
    llmService:
      host: qwen3-coder-kserve-workload-svc
      port: 8000
      tlsSecret: qwen3-coder-kserve-self-signed-certs
    replicas: 1
    gateway:
      enabled: false
    proxy:
      enabled: true
    detectors:
      promptInjection:
        enabled: true
        model: protectai/deberta-v3-base-prompt-injection-v2
        threshold: 0.5
        useGpu: false
      piiRegex:
        enabled: true
      secretsRegex:
        enabled: true
        patterns:
          - '\bAKIA[0-9A-Z]{16}\b'
          - '\bgh[ps]_[A-Za-z0-9_]{36,}\b'
          - '\bglpat-[A-Za-z0-9\-_]{20,}\b'
          - '\bsk-[A-Za-z0-9]{20,}\b'
          - '\bsk-ant-[A-Za-z0-9\-_]{20,}\b'
          - '\bxox[baprs]-[A-Za-z0-9\-]{10,}\b'
          - '-----BEGIN\s+(RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
    otel:
      enabled: false
# HTPasswd IDP is not created via Helm on existing clusters (OAuth CR is managed externally).
# Run `make setup-idp` to configure HTPasswd IDP via the additive patch script.
auth:
  htpasswd:
    enabled: false
