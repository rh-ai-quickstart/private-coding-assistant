# Values override for pca-ai-serving when deploying on an existing OpenShift cluster.
clusterResources: false
# Namespace-tenancy Thanos (:9092) — no cluster-monitoring-view required
pca-observability:
  prometheus:
    accessMode: namespace
vllm:
  maxModelLen: 49152
# RHCL front door (requires RHCL operator already on cluster; chart creates Kuadrant CR).
aiGateway:
  enabled: true
  escapeHatchToLlmd: false
  kuadrant:
    create: true
