# DevWorkspace TEMPLATE for OpenCode workspaces.
#
# IMPORTANT — DevSpaces Namespace Provisioning:
#   DevWorkspaces CANNOT be pre-deployed via ArgoCD into statically-named
#   namespaces. DevSpaces auto-provisions a unique namespace for each user
#   the first time they log into the DevSpaces dashboard:
#
#     Pattern: <username>-devspaces-<random-suffix>
#     Example: Dev1 → dev1-devspaces-wk1ug6
#
#   The DevWorkspace controller sets a `controller.devfile.io/creator` label
#   to the user's UID. The dashboard ONLY shows workspaces where this label
#   matches the logged-in user's UID. Workspaces created by kubeadmin (or
#   any other user) will be invisible to the target user.
#
# Correct workspace creation procedure:
#   1. Create users via HTPasswd IDP (see scripts/setup-devspaces-users.sh)
#   2. Each user logs into the DevSpaces dashboard (triggers NS provisioning)
#   3. Run scripts/setup-devspaces-users.sh which:
#      a. Logs in as each user via `oc login`
#      b. Discovers the auto-provisioned namespace
#      c. Grants image-puller RBAC for the custom OpenCode image
#      d. Creates the DevWorkspace AS the user (sets creator label correctly)
#
# This file is a REFERENCE TEMPLATE — it is not applied by ArgoCD.
# The actual workspace creation is handled by the setup script.
#
# Extension auto-installation:
#   The OpenCode VS Code extension (sst-dev.opencode) is auto-installed via
#   the DEFAULT_EXTENSIONS env var (official CheCode mechanism). The postStart
#   command downloads the .vsix from Open VSX and the editor picks it up.
#   See: https://eclipse.dev/che/docs/stable/administration-guide/default-extensions-for-microsoft-visual-studio-code/
#
# Model endpoint (routed through llm-d EPP → vLLM):
#   https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1
---
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspace
metadata:
  name: opencode-PLACEHOLDER_USERNAME
  # namespace: Set dynamically — must be the DevSpaces auto-provisioned namespace
  #   (e.g., dev1-devspaces-wk1ug6), NOT a statically-named namespace.
  labels:
    che.eclipse.org/devworkspace: "true"
  annotations:
    che.eclipse.org/devfile-source: |
      factory:
        params: url=https://github.com/manujoy7/Private_AI_Coding_Assistant.git
spec:
  started: true
  routingClass: che
  contributions:
    - name: editor
      uri: "https://eclipse-che.github.io/che-plugin-registry/main/v3/plugins/che-incubator/che-code/latest/devfile.yaml"
  template:
    projects:
      - name: private-ai-coding-assistant
        git:
          remotes:
            origin: https://github.com/manujoy7/Private_AI_Coding_Assistant.git
    components:
      - name: dev-tools
        container:
          image: image-registry.openshift-image-registry.svc:5000/opencode-build/devspaces-opencode:latest
          memoryLimit: 8Gi
          memoryRequest: 1Gi
          cpuLimit: "4000m"
          cpuRequest: 500m
          mountSources: true
          env:
            - name: VLLM_ENDPOINT
              value: "https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1"
            - name: VLLM_MODEL_ID
              value: "Qwen/Qwen3.6-35B-A3B-FP8"
            - name: OPENAI_API_KEY
              value: "EMPTY"
            - name: OPENAI_BASE_URL
              value: "https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: OPENCODE_SERVER_PASSWORD
              value: "PLACEHOLDER_PASSWORD"
            - name: DEFAULT_EXTENSIONS
              value: "/tmp/opencode-ext/sst-dev.opencode.vsix"
          endpoints:
            - name: opencode-web
              targetPort: 4096
              exposure: public
              protocol: https
              attributes:
                cookiesAuthEnabled: true
    commands:
      - id: download-opencode-extension
        exec:
          component: dev-tools
          commandLine: |
            mkdir -p /tmp/opencode-ext
            curl -fsSL "https://open-vsx.org/api/sst-dev/opencode/latest/file/sst-dev.opencode-0.0.13.vsix" \
              --location -o /tmp/opencode-ext/sst-dev.opencode.vsix
            echo "OpenCode extension downloaded"
          label: "Download OpenCode Extension"
      - id: start-opencode-web
        exec:
          component: dev-tools
          commandLine: |
            nohup opencode web --port 4096 --hostname 0.0.0.0 > /tmp/opencode-web.log 2>&1 &
            echo "OpenCode Web UI started on port 4096"
          label: "Start OpenCode Web UI"
    events:
      postStart:
        - download-opencode-extension
        - start-opencode-web
