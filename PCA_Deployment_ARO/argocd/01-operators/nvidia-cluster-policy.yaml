# NVIDIA GPU Operator ClusterPolicy — activates the GPU stack on ARO.
# useOpenShiftDriverToolkit: true is required for ARO to use the Red Hat
# Driver Toolkit (DTK) for in-cluster kernel module compilation, avoiding
# the need for pre-compiled drivers or privileged node access.
---
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  operator:
    defaultRuntime: crio
  daemonsets: {}
  driver:
    enabled: true
    useOpenShiftDriverToolkit: true
    upgradePolicy:
      autoUpgrade: true
      maxParallelUpgrades: 1
      maxUnavailable: "25%"
  toolkit:
    enabled: true
  devicePlugin:
    enabled: true
  dcgm:
    enabled: true
  dcgmExporter:
    enabled: true
  nodeStatusExporter:
    enabled: true
  gfd:
    enabled: true
  migManager:
    enabled: false
