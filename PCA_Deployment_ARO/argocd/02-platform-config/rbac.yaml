# RBAC for DevSpaces users.
#
# NOTE: These RoleBindings target statically-named namespaces (dev1-devspaces,
# dev2-devspaces) which are useful for shared team resources. However, actual
# DevWorkspaces run in auto-provisioned namespaces (e.g., dev1-devspaces-wk1ug6).
#
# The setup-devspaces-users.sh script handles RBAC for the auto-provisioned
# namespaces dynamically. These static bindings are kept for completeness.
#
# Users Dev1 and Dev2 are created via HTPasswd identity provider by the
# setup-devspaces-users.sh script.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devspaces-self-provisioner
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: Dev1
    apiGroup: rbac.authorization.k8s.io
  - kind: User
    name: Dev2
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: self-provisioner
  apiGroup: rbac.authorization.k8s.io
