# OpenShift Dev Spaces instance — creates the dashboard, workspace controller, registries.
# Configured with always-active workspaces (idle timeout disabled) to support
# long-running OpenCode sessions without interruption.
apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: devspaces
  namespace: openshift-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  devEnvironments:
    secondsOfInactivityBeforeIdling: -1
    secondsOfRunBeforeIdling: -1
    maxNumberOfWorkspacesPerUser: -1
    startTimeoutSeconds: 300
    defaultComponents:
      - name: dev-tools
        container:
          image: image-registry.openshift-image-registry.svc:5000/opencode-build/devspaces-opencode:latest
          memoryLimit: 8Gi
          memoryRequest: 1Gi
          cpuLimit: 4000m
          cpuRequest: 500m
          env:
            - name: VLLM_ENDPOINT
              value: "https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1"
            - name: VLLM_MODEL_ID
              value: "Qwen/Qwen3.6-35B-A3B-FP8"
            - name: OPENAI_API_KEY
              value: "EMPTY"
            - name: OPENAI_BASE_URL
              value: "https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
    storage:
      perUserStrategyPvcConfig:
        claimSize: 50Gi
      perWorkspaceStrategyPvcConfig:
        claimSize: 50Gi
  components:
    cheServer:
      debug: false
    dashboard:
      headerMessage:
        show: true
        text: "Private AI Code Assistant — OpenCode + Qwen3.6 via llm-d Gateway"
    devWorkspace: {}
    devfileRegistry: {}
    pluginRegistry: {}
  networking: {}
