# Job to generate a self-signed TLS certificate for the llm-d Gateway.
# Runs once after the namespace is created.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-gateway-tls
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: create-tls
          image: registry.access.redhat.com/ubi9/ubi:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              HOSTNAME="llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local"
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /tmp/tls.key -out /tmp/tls.crt \
                -subj "/CN=${HOSTNAME}" \
                -addext "subjectAltName=DNS:${HOSTNAME}"

              cat <<EOF > /tmp/secret.json
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                  "name": "llm-d-gateway-tls",
                  "namespace": "ai-serving"
                },
                "type": "kubernetes.io/tls",
                "data": {
                  "tls.crt": "$(base64 -w0 /tmp/tls.crt)",
                  "tls.key": "$(base64 -w0 /tmp/tls.key)"
                }
              }
              EOF

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              APISERVER=https://kubernetes.default.svc

              curl -sf -X POST \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                --cacert ${CACERT} \
                "${APISERVER}/api/v1/namespaces/ai-serving/secrets" \
                -d @/tmp/secret.json || \
              curl -sf -X PUT \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                --cacert ${CACERT} \
                "${APISERVER}/api/v1/namespaces/ai-serving/secrets/llm-d-gateway-tls" \
                -d @/tmp/secret.json

              echo "TLS secret llm-d-gateway-tls created/updated successfully"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tls-secret-creator
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tls-secret-creator
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ai-serving
roleRef:
  kind: Role
  name: tls-secret-creator
  apiGroup: rbac.authorization.k8s.io
