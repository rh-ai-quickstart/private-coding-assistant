# Qwen3.6-35B-A3B-FP8 on NVIDIA H100 NVL 94 GB
# Served via KServe RawDeployment with custom vLLM v0.19.0 ServingRuntime
# Routed through the Red Hat AI Gateway (llm-d) for production traffic
#
# Why vLLM v0.19.0 (upstream) instead of RHOAI bundled vLLM?
#   - RHOAI 3.3.1 bundles vllm-cuda-rhel9 based on vLLM ~0.13, which uses
#     transformers <5.x and does not recognise Qwen3_5MoeForConditionalGeneration.
#   - Qwen3.6-35B-A3B-FP8 requires transformers >=5.1 and vLLM >=0.18 for native
#     Qwen3.5-MoE architecture support, DeepGEMM FP8 MoE kernels, and
#     FlashAttention v3 on H100.
#   - vLLM v0.19.0 ships with PyTorch 2.10 + CUDA 12.9. The host NVIDIA driver
#     is 550 (CUDA 12.4), so VLLM_ENABLE_CUDA_COMPATIBILITY=1 bridges the gap
#     using compat libs (575.57.08).
#
# Model: Qwen3.6 MoE — 35B total / 3B active, 256 experts, FP8 weights (~35GB).
# Fits H100 94GB HBM3 with ample KV cache headroom.
#
# PVC for model weights is defined in pvcs.yaml (100Gi managed-csi).
#
# ─── Tool Calling & Reasoning Parser Configuration ───────────────────────────
#
# Qwen3.x models use XML-format tool calls and emit <think>...</think> blocks.
# The vLLM parser configuration MUST match the model family:
#
#   --tool-call-parser=qwen3_xml    Qwen3.x XML tool calls (required)
#   --reasoning-parser=qwen3        Strips <think> into the reasoning field
#   --enable-auto-tool-choice       Lets the model decide when to invoke tools
#
# DO NOT USE for Qwen3.x:
#   --tool-call-parser=hermes       Causes </think> leak, tool calls silently dropped
#   --tool-call-parser=qwen3_coder  Streaming bugs in vLLM 0.19 (fixed in 0.20+)
#   tool_choice="required"          JSON-only server path; fails with XML tool calls
#
# Client-side requirements (OpenCode / any OpenAI-compatible client):
#   enable_thinking: true            Default; lets model reason before tool calls
#   tool_choice: "auto"             NEVER use "required" with Qwen3.x
#
# Parser compatibility matrix (change these args when swapping models):
#
#   Model Family          tool-call-parser   reasoning-parser   min vLLM
#   ───────────────────── ────────────────── ────────────────── ────────
#   Qwen3.6 / Qwen3.5    qwen3_xml          qwen3              0.19.0
#   Qwen2.5              hermes             (none)             0.13+
#   DeepSeek R1 / V3     hermes             deepseek_r1        0.18+
#   Llama 3.x            llama3_json        (none)             0.15+
#   Mistral / Mixtral    mistral            (none)             0.14+
#
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: nvidia-h100-gpu
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/part-of: hardwareprofile
    app.opendatahub.io/hardwareprofile: "true"
  annotations:
    opendatahub.io/display-name: "NVIDIA H100 GPU"
    opendatahub.io/description: "NVIDIA H100 NVL 94GB HBM3 for LLM inference with vLLM."
    opendatahub.io/disabled: "false"
    opendatahub.io/managed: "false"
    opendatahub.io/dashboard-feature-visibility: '["model-serving"]'
spec:
  identifiers:
    - displayName: CPU
      identifier: cpu
      resourceType: CPU
      defaultCount: 8
      minCount: 4
      maxCount: 16
    - displayName: Memory
      identifier: memory
      resourceType: Memory
      defaultCount: 80Gi
      minCount: 40Gi
      maxCount: 120Gi
    - displayName: NVIDIA GPU
      identifier: nvidia.com/gpu
      defaultCount: 1
      minCount: 1
      maxCount: 1
  nodeSelectors:
    - key: nvidia.com/gpu.product
      value: NVIDIA-H100-NVL
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-cuda-v0190
  namespace: ai-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "vLLM v0.19.0 NVIDIA GPU (Custom)"
    opendatahub.io/template-display-name: "vLLM v0.19.0 NVIDIA GPU (Custom)"
    opendatahub.io/template-name: vllm-cuda-v0190
    opendatahub.io/apiProtocol: REST
    opendatahub.io/accelerator-name: nvidia.com/gpu
spec:
  annotations:
    prometheus.io/port: "8000"
    prometheus.io/path: /metrics
    prometheus.io/scrape: "true"
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.19.0
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8000
        - --served-model-name=Qwen/Qwen3.6-35B-A3B-FP8
        - --trust-remote-code
        - --enable-prefix-caching
        - --enable-auto-tool-choice
        - --tool-call-parser=qwen3_xml
        - --reasoning-parser=qwen3
      env:
        - name: VLLM_ENABLE_CUDA_COMPATIBILITY
          value: "1"
        - name: LD_LIBRARY_PATH
          value: "/usr/local/cuda/compat:/usr/local/cuda/lib64:/usr/lib64"
        - name: HF_HOME
          value: "/model-cache"
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRITON_CACHE_DIR
          value: "/model-cache/triton-cache"
        - name: XDG_CACHE_HOME
          value: "/model-cache/xdg-cache"
        - name: HOME
          value: "/tmp"
        - name: DG_JIT_CACHE_DIR
          value: "/model-cache/deep-gemm"
        - name: VLLM_CACHE_ROOT
          value: "/model-cache/vllm-cache"
      ports:
        - containerPort: 8000
          name: http
          protocol: TCP
      startupProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 120
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 30
        failureThreshold: 3
        timeoutSeconds: 10
      volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: model-cache
      persistentVolumeClaim:
        claimName: model-cache
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen36-vllm
  namespace: ai-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "Qwen 3.6-35B-A3B-FP8"
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/accelerator-name: nvidia.com/gpu
  # Scaling: increase maxReplicas and add GPU nodes to scale out.
  # Each replica requires 1x H100 GPU. The InferencePool + EPP
  # automatically discovers new replicas and routes intelligently.
  # To scale: oc scale machineset <gpu-ms> --replicas=N
  #           then update maxReplicas below to match.
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 4
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "present"
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-cuda-v0190
      args:
        - --model=Qwen/Qwen3.6-35B-A3B-FP8
        - --tensor-parallel-size=1
        - --max-model-len=262144
      resources:
        requests:
          cpu: "8"
          memory: 80Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "16"
          memory: 120Gi
          nvidia.com/gpu: "1"
