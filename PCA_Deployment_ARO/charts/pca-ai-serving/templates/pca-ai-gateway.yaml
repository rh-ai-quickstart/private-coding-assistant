{{- if .Values.aiGateway.enabled | default false }}
{{/*
  RHCL AI Gateway front door (ARO). Separate hop in front of llm-d.
  Client URL: https://{{ .Values.aiGateway.name | default "pca-ai-gateway" }}-data-science-gateway-class.ai-serving.svc.cluster.local/v1
*/}}
{{- $ns := .Values.namespace | default "ai-serving" }}
{{- $gwName := .Values.aiGateway.name | default "pca-ai-gateway" }}
{{- $tlsSecret := (.Values.aiGateway.tls).secretName | default "llm-d-gateway-tls" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gwName }}
  namespace: {{ $ns }}
  labels:
    kuadrant.io/gateway: "true"
    app.kubernetes.io/component: pca-ai-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ $tlsSecret }}
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
---
{{- if (.Values.aiGateway.backends).local.enabled | default true }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $gwName }}-local
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: pca-ai-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwName }}
      namespace: {{ $ns }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: ""
          kind: Service
          name: llm-d-gateway-data-science-gateway-class
          port: 443
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: {{ $gwName }}-apikey
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: pca-ai-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ $gwName }}-local
  rules:
    authentication:
      "pca-ai-gateway-apikey":
        apiKey:
          allNamespaces: true
          selector:
            matchLabels:
              app.kubernetes.io/component: pca-ai-gateway-apikey
              authorino.kuadrant.io/managed-by: authorino
{{- end }}
{{- end }}
