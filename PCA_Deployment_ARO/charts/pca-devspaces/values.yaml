aiServingNamespace: ai-serving
modelId: "Qwen/Qwen3.6-35B-A3B-FP8"
# RHCL AI Gateway — default IDE base URL (see _helpers.tpl aiGateway.baseUrl).
aiGateway:
  enabled: true
  name: pca-ai-gateway
  gatewayClassName: data-science-gateway-class
  escapeHatchToLlmd: false
  apiKeySecretName: pca-ai-gw-apikey
  # Seed for deterministic keys when Secret does not exist yet (setup script uses "pca-aro").
  apiKeySeed: pca-aro
guardrails:
  enabled: false
  endpoint: "http://pca-guardrails:8034/guardrailed"
# Optional static DevSpaces list for Helm-managed API key Secrets.
# Auto-provisioned namespaces (setup-devspaces-users.sh) create Secrets in the script instead.
devspaces: []
