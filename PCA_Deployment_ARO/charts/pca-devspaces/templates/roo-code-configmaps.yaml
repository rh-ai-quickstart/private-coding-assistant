# OpenCode configuration ConfigMaps for DevSpaces workspaces.
#
# These ConfigMaps are mounted into each workspace and provide the OpenCode
# global config pointing to the RHCL AI gateway (or llm-d escape hatch).
# API key is not stored here — set via OPENAI_API_KEY + postStart auth.json
# overwrite (see setup-devspaces-users.sh / write-opencode-config).
{{- $baseUrl := include "pca-devspaces.aiGateway.baseUrl" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-config
  namespace: openshift-devspaces
  labels:
    app.kubernetes.io/component: workspaces-config
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    controller.devfile.io/mount-as: subpath
    controller.devfile.io/mount-path: /home/user/.config/opencode
data:
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "provider": {
        "vllm": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "Private AI Gateway (llm-d)",
          "options": {
            "baseURL": {{ $baseUrl | quote }}
          },
          "models": {
            {{ .Values.modelId | quote }}: {
              "name": {{ .Values.modelId | quote }}
            }
          }
        }
      },
      "model": {{ printf "vllm/%s" .Values.modelId | quote }}
    }
