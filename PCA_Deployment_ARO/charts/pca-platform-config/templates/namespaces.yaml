# Namespaces for the AI platform.
#
# NOTE: DevSpaces user namespaces are NOT defined here. DevSpaces
# auto-provisions unique namespaces per user (e.g., dev1-devspaces-wk1ug6)
# when they first log into the dashboard. See setup-devspaces-users.sh.
apiVersion: v1
kind: Namespace
metadata:
  name: ai-serving
  labels:
    app.kubernetes.io/part-of: private-code-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: opencode-build
  labels:
    app.kubernetes.io/part-of: private-code-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "0"
