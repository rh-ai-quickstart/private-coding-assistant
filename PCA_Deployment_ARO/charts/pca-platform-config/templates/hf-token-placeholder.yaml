# HuggingFace token secret — PLACEHOLDER
# For production, use External Secrets Operator or Sealed Secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  token: {{ .Values.hfToken.raw | b64enc }}
