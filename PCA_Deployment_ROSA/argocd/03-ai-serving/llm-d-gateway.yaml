# Dedicated llm-d Gateway for internal cluster routing through EPP.
# Extensions use this Gateway's ClusterIP (never the external ELB).
#
# The resulting internal DNS endpoint is:
#   https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gateway
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: llm-d-gateway-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTPRoute: routes inference traffic through InferencePool (EPP)
# The InferencePool name is derived from LLMInferenceService: <name>-inference-pool
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-route
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-d-gateway
      namespace: ai-serving
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen3-coder-inference-pool
          port: 8000
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
    - matches:
        - path:
            type: PathPrefix
            value: /v1/completions
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen3-coder-inference-pool
          port: 8000
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
    - matches:
        - path:
            type: PathPrefix
            value: /v1/models
      backendRefs:
        - group: ""
          kind: Service
          name: qwen3-coder-kserve-workload-svc
          port: 8000
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen3-coder-inference-pool
          port: 8000
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
