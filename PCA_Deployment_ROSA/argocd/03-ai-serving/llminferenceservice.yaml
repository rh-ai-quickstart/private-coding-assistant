# LLMInferenceService — Qwen3-Coder-30B on NVIDIA GPU via KServe + llm-d
# This single CR creates: Deployment, Service, InferencePool, EPP, HTTPRoute
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen3-coder
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/model-type: generative
    openshift.io/display-name: Qwen3 Coder 30B
    security.opendatahub.io/enable-auth: "false"
spec:
  modelSpec:
    uri: hf://Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
    name: Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
    replicas: 1
  routerSpec:
    targetModels: {}
    gatewayRef:
      name: maas-default-gateway
      namespace: openshift-ingress
    route: {}
    scheduler:
      template:
        spec:
          containers:
            - name: main
              args:
                - --pool-group
                - inference.networking.x-k8s.io
                - --pool-name
                - "{{ ChildName .ObjectMeta.Name `-inference-pool` }}"
                - --pool-namespace
                - "{{ .ObjectMeta.Namespace }}"
                - --grpc-port
                - "9002"
                - --grpc-health-port
                - "9003"
                - --secure-serving
                - --model-server-metrics-scheme
                - https
                - --config
                - |
                  apiVersion: epp.llm-d.ai/v1alpha1
                  kind: EndpointPickerConfig
                  metadata:
                    name: epp-config
                  spec:
                    scheduler:
                      scorers:
                        - name: queue-scorer
                          weight: 2
                        - name: kv-cache-utilization-scorer
                          weight: 2
                        - name: prefix-cache-scorer
                          weight: 3
              env:
                - name: TOKENIZER_CACHE_DIR
                  value: /tmp/tokenizer-cache
                - name: HF_HOME
                  value: /tmp/tokenizer-cache/hf
                - name: TRANSFORMERS_CACHE
                  value: /tmp/tokenizer-cache/transformers
                - name: XDG_CACHE_HOME
                  value: /tmp/tokenizer-cache/xdg
              volumeMounts:
                - name: tokenizer-cache
                  mountPath: /tmp/tokenizer-cache
                - name: cachi2-cache
                  mountPath: /cachi2
          volumes:
            - name: tokenizer-cache
              emptyDir:
                sizeLimit: 2Gi
            - name: cachi2-cache
              emptyDir:
                sizeLimit: 1Gi
  workloadSpec:
    template:
      spec:
        volumes:
          - name: kserve-provision-location
            persistentVolumeClaim:
              claimName: model-cache
        containers:
          - name: main
            env:
              - name: VLLM_ADDITIONAL_ARGS
                value: >-
                  --disable-uvicorn-access-log --max-model-len 32768 --gpu-memory-utilization 0.90 --enable-prefix-caching --enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3 --kv-cache-dtype fp8
            volumeMounts:
              - name: kserve-provision-location
                mountPath: /mnt/models
            resources:
              requests:
                cpu: "4"
                memory: 48Gi
                nvidia.com/gpu: "1"
              limits:
                cpu: "4"
                memory: 48Gi
                nvidia.com/gpu: "1"
            livenessProbe:
              httpGet:
                path: /health
                port: 8000
                scheme: HTTPS
              initialDelaySeconds: 300
              periodSeconds: 30
              timeoutSeconds: 30
              failureThreshold: 10
            readinessProbe:
              httpGet:
                path: /health
                port: 8000
                scheme: HTTPS
              initialDelaySeconds: 120
              periodSeconds: 15
              timeoutSeconds: 10
              failureThreshold: 5
        nodeSelector:
          node.kubernetes.io/instance-type: g6e.2xlarge
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
