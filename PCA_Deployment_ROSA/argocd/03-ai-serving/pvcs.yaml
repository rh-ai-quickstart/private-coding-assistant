# Persistent Volume Claims for model weight caching.
# Using PVCs avoids re-downloading models on pod restarts (~30GB for Qwen3-Coder-30B).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-csi
  resources:
    requests:
      storage: 100Gi
