# RBAC for DevSpaces users — grants namespace admin in their respective namespaces
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user1-admin
  namespace: dev1-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: dev-user1
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user2-admin
  namespace: dev2-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: dev-user2
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user3-admin
  namespace: dev3-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: dev-user3
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
