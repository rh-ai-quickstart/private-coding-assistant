{{- if .Values.devspaces.enabled }}
{{- range .Values.users }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .username }}-edit
  namespace: {{ .username }}{{ $.Values.devspaces.namespaceSuffix }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: {{ .username }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# Allow workspace service accounts to exec into pods (required for che-code terminal)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-pod-exec
  namespace: {{ .username }}{{ $.Values.devspaces.namespaceSuffix }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-pod-exec
  namespace: {{ .username }}{{ $.Values.devspaces.namespaceSuffix }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: Group
    name: system:serviceaccounts:{{ .username }}{{ $.Values.devspaces.namespaceSuffix }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: workspace-pod-exec
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
