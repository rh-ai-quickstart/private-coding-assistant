aiServingNamespace: ai-serving
devspacesGlobalConfig:
  enabled: true
guardrails:
  enabled: false
  endpoint: "http://pca-guardrails:8034/guardrailed"
mcp:
  enabled: false
  # Direct MCP server SSE URL. Defaults to openshift-mcp service in aiServingNamespace.
  # Override if deploying to a different namespace or using the MCP Gateway.
  serverUrl: ""
devspaces:
  - namespace: dev-user1-devspaces
    name: code-workspace-1
    user: dev-user1
  - namespace: dev-user2-devspaces
    name: code-workspace-2
    user: dev-user2
  - namespace: dev-user3-devspaces
    name: code-workspace-3
    user: dev-user3
