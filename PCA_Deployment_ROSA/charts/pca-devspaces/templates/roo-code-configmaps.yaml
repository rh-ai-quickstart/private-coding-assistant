# DevSpaces AI extension ConfigMaps.
#
# DESIGN:
#   continue-config  — sourced in openshift-devspaces, synced to each user namespace by the
#                      DevSpaces operator. Mounted read-only at /home/user/.continue (subpath).
#                      The DevWorkspace postStart script creates a writable
#                      /home/user/.continue-data/ directory and symlinks config.yaml into it so
#                      Continue can write session data alongside a read-only config.
#
#   roo-code-provider-config — per-namespace; mounted via subpath directly into Roo Code's
#                      active settings path. Uses the `openai` provider (NOT `openai-native`)
#                      with streaming disabled so the qwen3_coder tool-call parser returns
#                      complete structured tool_calls instead of fragmented streaming XML.
#
# NOTE: The llm-d gateway URL uses HTTPS with a cluster-internal cert; extensions must set
#       NODE_TLS_REJECT_UNAUTHORIZED=0 or requestOptions.verifySsl=false.
# ── Continue config (source namespace — synced to all user namespaces) ──────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: continue-config
  namespace: openshift-devspaces
  labels:
    app.kubernetes.io/component: workspaces-config
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    controller.devfile.io/mount-as: subpath
    controller.devfile.io/mount-path: /home/user/.continue
data:
  config.yaml: |
    name: Private Code Assistant
    version: 1.0.0
    schema: v1
    models:
      - name: Qwen3-Coder (llm-d)
        provider: openai
        model: Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
        apiBase: https://llm-d-gateway-data-science-gateway-class.{{ .Values.aiServingNamespace }}.svc.cluster.local/v1
        apiKey: EMPTY
        systemMessage: "You are a helpful coding assistant. Respond using natural language and code blocks only. Never use XML tool-call syntax such as <tool_call>, <function=...>, or <parameter=...> in your responses."
        requestOptions:
          verifySsl: false
    tabAutocompleteModel:
      name: Qwen3-Coder Autocomplete (llm-d)
      provider: openai
      model: Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      apiBase: https://llm-d-gateway-data-science-gateway-class.{{ .Values.aiServingNamespace }}.svc.cluster.local/v1
      apiKey: EMPTY
      requestOptions:
        verifySsl: false
{{- range .Values.users }}
---
# ── Roo Code provider config — {{ .username }}{{ $.Values.namespaceSuffix }} ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: roo-code-provider-config
  namespace: {{ .username }}{{ $.Values.namespaceSuffix }}
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    controller.devfile.io/mount-as: subpath
    controller.devfile.io/mount-path: /checode/remote/data/User/globalStorage/rooveterinaryinc.roo-cline/settings
data:
  cline_custom_modes.json: '[]'
  provider_profiles.json: |
    {
      "currentApiConfigName": "llm-d-qwen3-coder",
      "apiConfigs": {
        "llm-d-qwen3-coder": {
          "id": "llm-d-qwen3-coder",
          "apiProvider": "openai",
          "openAiBaseUrl": "https://llm-d-gateway-data-science-gateway-class.{{ $.Values.aiServingNamespace }}.svc.cluster.local/v1",
          "openAiApiKey": "EMPTY",
          "openAiModelId": "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8",
          "openAiStreamingEnabled": false
        }
      },
      "modeApiConfigs": {
        "code": "llm-d-qwen3-coder",
        "architect": "llm-d-qwen3-coder",
        "ask": "llm-d-qwen3-coder",
        "debug": "llm-d-qwen3-coder",
        "orchestrator": "llm-d-qwen3-coder"
      }
    }
{{- end }}
