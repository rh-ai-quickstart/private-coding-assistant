{{- if .Values.opencodeBuild.enabled }}
# OpenCode custom DevSpaces image — build infrastructure.
# Automatically builds the custom image on cluster deploy via GitOps.
#
# The BuildConfig creates the image from an inline Dockerfile
# and stores it in the internal registry. DevWorkspaces reference
# this image for OpenCode-enabled workspaces.
apiVersion: v1
kind: Namespace
metadata:
  name: opencode-build
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: devspaces-opencode
  namespace: opencode-build
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: devspaces-opencode
  namespace: opencode-build
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  output:
    to:
      kind: ImageStreamTag
      name: devspaces-opencode:latest
  source:
    type: Dockerfile
    dockerfile: |
      FROM registry.redhat.io/devspaces/udi-rhel8:latest
      USER root
      RUN curl -fsSL https://opencode.ai/install | OPENCODE_VERSION={{ .Values.opencodeBuild.opencodeVersion }} bash && \
          cp /home/user/.opencode/bin/opencode /usr/local/bin/opencode && \
          chmod 755 /usr/local/bin/opencode && \
          printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/xdg-open && \
          chmod 755 /usr/local/bin/xdg-open
      RUN mkdir -p /home/user/.config/opencode /home/user/.local/share/opencode && \
          echo '{"$schema":"https://opencode.ai/config.json","provider":{"vllm":{"npm":"@ai-sdk/openai-compatible","name":"Private AI Gateway (llm-d)","options":{"baseURL":"https://llm-d-gateway-data-science-gateway-class.{{ .Values.aiServingNamespace }}.svc.cluster.local/v1","extraBody":{"chat_template_kwargs":{"enable_thinking":false}}},"models":{"{{ .Values.modelId }}":{"name":"{{ .Values.modelId }}"}}}},"model":"vllm/{{ .Values.modelId }}"}' \
            > /home/user/.config/opencode/opencode.json && \
          echo '{"vllm":{"type":"api","key":"EMPTY"}}' > /home/user/.local/share/opencode/auth.json && \
          chown -R 1001:0 /home/user/.config/opencode /home/user/.local/share/opencode && \
          chmod -R g=u /home/user/.config/opencode /home/user/.local/share/opencode
      ENV NODE_TLS_REJECT_UNAUTHORIZED=0
      USER 1001
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: DockerImage
        name: registry.redhat.io/devspaces/udi-rhel8:latest
  triggers: []
---
# Grant image-puller so DevSpaces workspaces can pull the custom OpenCode image.
# Granted to all authenticated SAs to cover auto-provisioned user namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devspaces-image-puller-main
  namespace: opencode-build
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: Group
    name: system:serviceaccounts:openshift-devspaces
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devspaces-image-puller-authenticated
  namespace: opencode-build
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
{{- end }}
