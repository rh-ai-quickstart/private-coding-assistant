{{- if .Values.devspacesGlobalConfig.enabled }}
# Cluster-wide VS Code extension recommendations for all DevSpaces workspaces.
# Continue config lives ONLY in per-namespace continue-configmaps.yaml (real
# ideApiKey + X-PCA-* headers). Do not put a mountable continue-config here —
# DevSpaces copies openshift-devspaces ConfigMaps with mount-to-devworkspace
# into user namespaces and would clobber the per-ns key/headers with EMPTY.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vscode-extensions-config
  namespace: openshift-devspaces
  labels:
    app.kubernetes.io/component: workspaces-config
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  .vscode-extensions.json: |
    {
      "recommendations": [
        "Continue.continue",
        "saoudrizwan.claude-dev",
        "RooVeterinaryInc.roo-cline",
        "sst-dev.opencode"
      ]
    }
{{- end }}
