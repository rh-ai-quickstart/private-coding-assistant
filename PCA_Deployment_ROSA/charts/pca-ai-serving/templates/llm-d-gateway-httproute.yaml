apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-gateway-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: llm-d-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/completions
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: qwen3-coder-inference-pool
      port: 8000
    timeouts:
      request: "0s"
      backendRequest: "0s"
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: qwen3-coder-inference-pool
      port: 8000
    timeouts:
      request: "0s"
      backendRequest: "0s"
  - matches:
    - path:
        type: PathPrefix
        value: /v1/responses
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: qwen3-coder-inference-pool
      port: 8000
    timeouts:
      request: "0s"
      backendRequest: "0s"
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: qwen3-coder-kserve-workload-svc
      port: 8000
    timeouts:
      request: "0s"
      backendRequest: "0s"
