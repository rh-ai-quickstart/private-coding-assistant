# HardwareProfile for NVIDIA L40S (g6e.2xlarge) — matches Terraform GPU machine pool
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: gpu-l40s
  namespace: redhat-ods-applications
  labels:
    app.opendatahub.io/hardwareprofile: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/display-name: NVIDIA L40S (g6e.2xlarge)
    opendatahub.io/description: >-
      AWS g6e.2xlarge with 1x NVIDIA L40S GPU (48 GB VRAM), 8 vCPUs, 32 GiB RAM.
spec:
  identifiers:
    - displayName: CPU
      identifier: cpu
      resourceType: CPU
      defaultCount: 4
      minCount: 1
      maxCount: 8
    - displayName: Memory
      identifier: memory
      resourceType: Memory
      defaultCount: 16Gi
      minCount: 4Gi
      maxCount: 32Gi
    - displayName: GPU
      identifier: nvidia.com/gpu
      defaultCount: 1
      minCount: 1
      maxCount: 1
  scheduling:
    type: Node
    node:
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.2xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
