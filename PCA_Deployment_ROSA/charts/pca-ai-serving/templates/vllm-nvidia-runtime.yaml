# vLLM NVIDIA GPU ServingRuntime for KServe raw deployment
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-nvidia-runtime
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    openshift.io/display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  supportedModelFormats:
    - name: vLLM
      version: "1"
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: quay.io/modh/vllm@sha256:c86250f65c33e1a87e1f8fde67e7e22c24ff42cffe60f1d2f0a20499a66059e0
      ports:
        - containerPort: 8000
          name: http
          protocol: TCP
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf-home
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 10
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 300
        periodSeconds: 30
        timeoutSeconds: 30
        failureThreshold: 10
      volumeMounts:
        - name: hf-cache
          mountPath: /tmp/hf-home
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: hf-cache
      emptyDir:
        sizeLimit: 2Gi
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
