{{- if .Values.langfuse.enabled }}
{{- $ns := include "pca-observability.namespace" . -}}
{{- $secretName := "pca-langfuse-credentials" -}}
{{- $existing := lookup "v1" "Secret" $ns $secretName -}}

{{- $creds := .Values.langfuse.credentials | default dict -}}
{{- $salt := $creds.salt | default "" -}}
{{- $encKey := $creds.encryptionKey | default "" -}}
{{- $nextauth := $creds.nextauthSecret | default "" -}}
{{- $pgPass := $creds.postgresPassword | default "" -}}
{{- $redisPass := $creds.redisPassword | default "" -}}
{{- $chPass := $creds.clickhousePassword | default "" -}}
{{- $s3Pass := $creds.s3RootPassword | default "" -}}
{{- $userPass := $creds.initUserPassword | default "" -}}
{{- $pk := $creds.initProjectPublicKey | default "" -}}
{{- $sk := $creds.initProjectSecretKey | default "" -}}

{{- if $existing -}}
  {{- if and (not $salt) (index $existing.data "salt") -}}{{- $salt = index $existing.data "salt" | b64dec -}}{{- end -}}
  {{- if and (not $encKey) (index $existing.data "encryption-key") -}}{{- $encKey = index $existing.data "encryption-key" | b64dec -}}{{- end -}}
  {{- if and (not $nextauth) (index $existing.data "nextauth-secret") -}}{{- $nextauth = index $existing.data "nextauth-secret" | b64dec -}}{{- end -}}
  {{- if and (not $pgPass) (index $existing.data "postgres-password") -}}{{- $pgPass = index $existing.data "postgres-password" | b64dec -}}{{- end -}}
  {{- if and (not $redisPass) (index $existing.data "redis-password") -}}{{- $redisPass = index $existing.data "redis-password" | b64dec -}}{{- end -}}
  {{- if and (not $chPass) (index $existing.data "clickhouse-password") -}}{{- $chPass = index $existing.data "clickhouse-password" | b64dec -}}{{- end -}}
  {{- if and (not $s3Pass) (index $existing.data "s3-root-password") -}}{{- $s3Pass = index $existing.data "s3-root-password" | b64dec -}}{{- end -}}
  {{- if and (not $userPass) (index $existing.data "init-user-password") -}}{{- $userPass = index $existing.data "init-user-password" | b64dec -}}{{- end -}}
  {{- if and (not $pk) (index $existing.data "init-project-public-key") -}}{{- $pk = index $existing.data "init-project-public-key" | b64dec -}}{{- end -}}
  {{- if and (not $sk) (index $existing.data "init-project-secret-key") -}}{{- $sk = index $existing.data "init-project-secret-key" | b64dec -}}{{- end -}}
{{- end -}}

{{- if not $salt -}}{{- $salt = randAlphaNum 32 | b64enc -}}{{- end -}}
{{- if not $encKey -}}{{- $encKey = randAlphaNum 32 | sha256sum | trunc 64 -}}{{- end -}}
{{- if not $nextauth -}}{{- $nextauth = randAlphaNum 32 -}}{{- end -}}
{{- if not $pgPass -}}{{- $pgPass = randAlphaNum 24 -}}{{- end -}}
{{- if not $redisPass -}}{{- $redisPass = randAlphaNum 24 -}}{{- end -}}
{{- if not $chPass -}}{{- $chPass = randAlphaNum 24 -}}{{- end -}}
{{- if not $s3Pass -}}{{- $s3Pass = randAlphaNum 24 -}}{{- end -}}
{{- if not $userPass -}}{{- $userPass = randAlphaNum 24 -}}{{- end -}}
{{- if not $pk -}}{{- $pk = printf "pk-lf-%s" (randAlphaNum 32) -}}{{- end -}}
{{- if not $sk -}}{{- $sk = printf "sk-lf-%s" (randAlphaNum 32) -}}{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: pca-langfuse
    app.kubernetes.io/part-of: pca-observability
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  salt: {{ $salt | quote }}
  encryption-key: {{ $encKey | quote }}
  nextauth-secret: {{ $nextauth | quote }}
  postgres-password: {{ $pgPass | quote }}
  redis-password: {{ $redisPass | quote }}
  clickhouse-password: {{ $chPass | quote }}
  s3-root-password: {{ $s3Pass | quote }}
  s3-root-user: minio
  init-user-password: {{ $userPass | quote }}
  init-project-public-key: {{ $pk | quote }}
  init-project-secret-key: {{ $sk | quote }}
  # Basic auth header for OTLP → Langfuse (base64 of pk:sk)
  otlp-auth-header: {{ printf "Basic %s" (printf "%s:%s" $pk $sk | b64enc) | quote }}
{{- end }}
