{{- if .Values.grafana.enabled }}
{{- $ns := include "pca-observability.namespace" . -}}
{{- $secretName := "pca-grafana-admin" -}}
{{- /* Prefer explicit values; else stable hash (Argo-safe: lookup/rand drifts each sync). */ -}}
{{- $password := .Values.grafana.adminPassword | default "" -}}
{{- if not $password -}}
  {{- $password = printf "%s/%s/pca-grafana" $ns .Release.Name | sha256sum | trunc 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: pca-grafana
    app.kubernetes.io/part-of: pca-observability
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  admin-user: admin
  admin-password: {{ $password | quote }}
{{- end }}
