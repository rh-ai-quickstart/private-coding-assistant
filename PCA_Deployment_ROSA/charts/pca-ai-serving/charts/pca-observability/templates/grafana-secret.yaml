{{- if .Values.grafana.enabled }}
{{- $ns := include "pca-observability.namespace" . -}}
{{- $secretName := "pca-grafana-admin" -}}
{{- $existing := lookup "v1" "Secret" $ns $secretName -}}
{{- $password := .Values.grafana.adminPassword -}}
{{- if not $password -}}
  {{- if and $existing (index $existing.data "admin-password") -}}
    {{- $password = index $existing.data "admin-password" | b64dec -}}
  {{- else -}}
    {{- $password = randAlphaNum 24 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: pca-grafana
    app.kubernetes.io/part-of: pca-observability
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  admin-user: admin
  admin-password: {{ $password | quote }}
{{- end }}
