namespace: ai-serving
clusterResources: true
vllm:
  maxModelLen: 32768
gatewayName: llm-d-gateway
# RHCL AI Gateway in front of llm-d (auth + future multi-destination / quotas).
# Does not replace llm-d-gateway / EPP / InferencePool.
aiGateway:
  enabled: true
  name: pca-ai-gateway
  gatewayClassName: data-science-gateway-class
  # When true, DevSpaces IDEs skip RHCL and call llm-d directly (break-glass).
  escapeHatchToLlmd: false
  tls:
    secretName: qwen3-coder-kserve-self-signed-certs
  # ROSA/ARO: pca-operators already owns Namespace + Kuadrant CR (default false).
  # Existing OpenShift: override create=true (see deploy_existing_openshift/values-ai-serving.yaml).
  kuadrant:
    create: false
    namespace: kuadrant-system
    name: kuadrant
  backends:
    local:
      enabled: true
    # Phase-1 stubs — enable later and route by OpenAI model name.
    otherCluster:
      enabled: false
      url: ""
    external:
      enabled: false
      url: ""
  # Follow-up: RateLimitPolicy / TokenRateLimitPolicy (not enforced in Phase 1).
  rateLimits:
    enabled: false
  # Follow-up: scale the front-door Gateway Deployment (not enforced in Phase 1).
  ha:
    replicas: 1
# Observability (pca-observability subchart)
# Installs when observability.enabled (default true because grafana.enabled defaults true).
# Set observability.enabled=false to skip the entire subchart.
observability:
  enabled: true
# Top-level grafana.enabled is unused by parent templates (subchart reads pca-observability.grafana).
grafana:
  enabled: true
pca-observability:
  # Inherit AI serving namespace (Makefile / --set also set this)
  namespace: ai-serving
  grafana:
    enabled: true
  # Single source of truth for Langfuse (parent LLMInferenceService + subchart stack)
  langfuse:
    enabled: false
    # metadata = tokens/latency via OTEL only; full = also store prompt/completion via vLLM middleware
    ioCapture: full
  prometheus:
    # ROSA full provision: cluster. Existing OpenShift override: namespace.
    accessMode: cluster
  cost:
    # PLACEHOLDER — illustrative L40S on-demand from sizing doc; not billing truth
    gpuHourlyUsd: 1.86
    gpuHourlyUsdIsPlaceholder: true
  persistence:
    storageClass: ""
    postgresSize: 10Gi
    clickhouseSize: 20Gi
