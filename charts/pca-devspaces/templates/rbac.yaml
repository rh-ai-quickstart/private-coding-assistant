{{- range $i, $devspace := .Values.devspaces }}
{{- $ns := $devspace.namespace | default $.Release.Namespace }}
{{- if $devspace.user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $devspace.user }}-edit
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: User
    name: {{ $devspace.user }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-pod-exec
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-pod-exec
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: Group
    name: system:serviceaccounts:{{ $ns }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: workspace-pod-exec
  apiGroup: rbac.authorization.k8s.io
{{- if eq ($devspace.type | default "continue") "opencode" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opencode-web-secret-reader
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["opencode-web-password"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opencode-web-secret-reader
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: Group
    name: system:serviceaccounts:{{ $ns }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: opencode-web-secret-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
