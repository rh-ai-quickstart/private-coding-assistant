# Roo Code provider config — one per devspace namespace.
#
# IMPORTANT: Use `openai` provider (NOT `openai-native`).
#   - `openai` respects openAiStreamingEnabled: false → non-streaming → vLLM returns complete
#     structured tool_calls in one response (the qwen3_coder parser works correctly).
#   - `openai-native` always streams → the qwen3_coder streaming parser emits raw XML fragments
#     as content instead of tool_calls → Roo Code sees no tool calls → every turn fails.
#
# IMPORTANT: mount-path targets Roo Code 3.x active settings path (/checode/remote/data/...).
#   The old path (/checode/checode-linux-libc/...) is NOT read by Roo Code at runtime.
#   The postStart script also copies from the old mount path as a fallback in case the
#   subpath mount is applied before /checode/remote/data/ is initialised by che-code.
#
# Attribution: openAiHeaders X-PCA-* → Langfuse userId / team / devspace (when Langfuse enabled).
{{- range $i, $devspace := .Values.devspaces }}
{{- if ne ($devspace.type | default "continue") "opencode" }}
{{- $ns := $devspace.namespace | default $.Release.Namespace }}
{{- $user := $devspace.user | default "unknown" }}
{{- $team := $devspace.team | default "" }}
{{- $baseUrl := include "pca-devspaces.aiGateway.baseUrl" $ }}
{{- $apiKey := include "pca-devspaces.aiGateway.ideApiKey" (dict "root" $ "ns" $ns) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: roo-code-provider-config
  namespace: {{ $ns }}
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    controller.devfile.io/mount-as: subpath
    controller.devfile.io/mount-path: /checode/remote/data/User/globalStorage/rooveterinaryinc.roo-cline/settings
data:
  cline_custom_modes.json: '[]'
  {{- if $.Values.mcp.enabled }}
  mcp_settings.json: |
    {
      "mcpServers": {
        "openshift-ai-mcp": {
          "url": {{ if $.Values.mcp.serverUrl }}{{ $.Values.mcp.serverUrl | quote }}{{ else }}"http://openshift-mcp.{{ $.Values.aiServingNamespace }}.svc.cluster.local:8080/sse"{{ end }},
          "type": "sse",
          "disabled": false
        }
      }
    }
  {{- end }}
  provider_profiles.json: |
    {
      "currentApiConfigName": "llm-d-qwen3-coder",
      "apiConfigs": {
        "llm-d-qwen3-coder": {
          "id": "llm-d-qwen3-coder",
          "apiProvider": "openai",
          "openAiBaseUrl": {{ $baseUrl | quote }},
          "openAiApiKey": {{ $apiKey | quote }},
          "openAiModelId": "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8",
          "openAiStreamingEnabled": false,
          "openAiHeaders": {
            "X-PCA-User": "{{ $user }}",
            "X-PCA-DevSpace": "{{ $ns }}"{{ if $team }},
            "X-PCA-Team": "{{ $team }}"{{ end }}
          }
        }
      },
      "modeApiConfigs": {
        "code": "llm-d-qwen3-coder",
        "architect": "llm-d-qwen3-coder",
        "ask": "llm-d-qwen3-coder",
        "debug": "llm-d-qwen3-coder",
        "orchestrator": "llm-d-qwen3-coder"
      }
    }
{{- end }}
{{- end }}
