{{- range .Values.devspaces }}
{{- if eq (.type | default "continue") "opencode" }}
{{- $ns := .namespace }}
{{- $existing := lookup "v1" "Secret" $ns "opencode-web-password" }}
apiVersion: v1
kind: Secret
metadata:
  name: opencode-web-password
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: opencode-web-password
    app.kubernetes.io/part-of: pca-devspaces
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data "password") }}
  password: {{ index $existing.data "password" }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
---
{{- end }}
{{- end }}
