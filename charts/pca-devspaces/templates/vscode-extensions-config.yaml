# Cluster-wide VS Code extension recommendations for all DevSpaces workspaces.
# NOTE: "recommendations" only show the extension in the sidebar — they do NOT
# auto-install. For auto-installation, use the DEFAULT_EXTENSIONS env var
# pointing to .vsix file paths (downloaded in a postStart command).
# See: https://eclipse.dev/che/docs/stable/administration-guide/default-extensions-for-microsoft-visual-studio-code/
# This auto-install mechanism is configured in devworkspaces.yaml and
# setup-devspaces-users.sh via DEFAULT_EXTENSIONS + postStart download.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vscode-extensions-config
  namespace: openshift-devspaces
  labels:
    app.kubernetes.io/component: workspaces-config
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  .vscode-extensions.json: |
    {
      "recommendations": [
        "sst-dev.opencode"
      ]
    }
