{{/*
  Per-DevSpaces API key for RHCL AuthPolicy.

  - Secret in the DevSpaces namespace (IDE ConfigMaps read the same value via helper).
  - Mirror Secret in the AI serving namespace for Authorino (label selector).
*/}}
{{- $ai := .Values.aiGateway | default dict }}
{{- if and ($ai.enabled | default true) (not ($ai.escapeHatchToLlmd | default false)) (not .Values.guardrails.enabled) }}
{{- range $i, $devspace := .Values.devspaces }}
{{- $ns := $devspace.namespace | default $.Release.Namespace }}
{{- $secretName := ($.Values.aiGateway.apiKeySecretName | default "pca-ai-gw-apikey") }}
{{- $apiKey := include "pca-devspaces.aiGateway.apiKey" (dict "root" $ "ns" $ns) }}
{{- $aiNs := $.Values.aiServingNamespace | default "ai-serving" }}
{{- $aiSecretName := printf "pca-ai-gw-apikey-%s" ($ns | trunc 40 | trimSuffix "-") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $secretName }}
    app.kubernetes.io/part-of: pca-devspaces
    app.kubernetes.io/component: pca-ai-gateway-apikey
type: Opaque
stringData:
  api_key: {{ $apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $aiSecretName }}
  namespace: {{ $aiNs }}
  labels:
    authorino.kuadrant.io/managed-by: authorino
    app.kubernetes.io/component: pca-ai-gateway-apikey
    app.kubernetes.io/part-of: pca-devspaces
    pca.ai/dev-namespace: {{ $ns | quote }}
  annotations:
    pca.ai/dev-namespace: {{ $ns | quote }}
type: Opaque
stringData:
  api_key: {{ $apiKey | quote }}
{{- end }}
{{- end }}
