{{- if .Values.gateway.enabled }}
{{- if .Values.openshift.enabled }}
# HTTPRoute for the OpenShift MCP server — required by MCPServerRegistration
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-route
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: {{ .Values.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp/openshift
      backendRefs:
        - name: openshift-mcp
          port: 8080
---
# MCPServerRegistration — registers the OpenShift MCP server with the gateway.
# All tools from this server are prefixed with "openshift_" to avoid collisions.
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: openshift-mcp-registration
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  toolPrefix: "openshift_"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openshift-mcp-route
    namespace: {{ .Values.namespace }}
{{- end }}
{{- if .Values.mariadb.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mariadb-mcp-route
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: {{ .Values.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp/mariadb
      backendRefs:
        - name: mariadb-mcp
          port: 8080
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: mariadb-mcp-registration
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  toolPrefix: "db_"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mariadb-mcp-route
    namespace: {{ .Values.namespace }}
{{- end }}
{{- end }}
