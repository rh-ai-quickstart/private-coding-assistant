apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gateway
  namespace: {{ .Values.namespace }}
  labels:
    istio.io/rev: openshift-gateway
  annotations:
    # Auth is enforced at the RHCL front door (pca-ai-gateway AuthPolicy).
    # Keep ODH from recreating kubernetesTokenReview AuthPolicies on this Gateway.
    opendatahub.io/managed: "false"
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
  - name: https
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.aiGateway.tls.secretName | default "qwen3-coder-kserve-self-signed-certs" }}
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Same
